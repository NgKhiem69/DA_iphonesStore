<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Wishlist - Exclusive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div th:replace="~{fragments :: header}"></div>

  <main class="container my-5">
    <div class="row">
        <div class="col-12">
            <div class="row row-cols-1 row-cols-sm-2 row-cols-md-4 g-4">
                <div class="col" th:each="sp : ${products}">
                    <div class="card h-100 shadow-sm position-relative">

                        <img th:if="${sp.imageUrl != null and !sp.imageUrl.isEmpty()}" 
                             th:src="${sp.imageUrl}" 
                             class="card-img-top" 
                             alt="Sản phẩm" 
                             style="height: 200px; object-fit: contain; padding: 10px;" />
                             
                        <img th:unless="${sp.imageUrl != null and !sp.imageUrl.isEmpty()}" 
                             src="https://via.placeholder.com/300x300" 
                             class="card-img-top" 
                             alt="Chưa có ảnh" 
                             style="height: 200px; object-fit: contain; padding: 10px;" />

                        <div class="card-body">
                            <h6 class="card-title">
                                <a th:href="@{/cart/add/{id}(id=${sp.id})}" class="text-decoration-none text-dark" th:text="${sp.name}"></a>
                            </h6>
                            <div class="fw-bold text-danger fs-5" th:text="${#numbers.formatDecimal(sp.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></div>
                        </div>

                        <div class="card-footer bg-white border-0">
                            <a th:href="@{/cart/add/{id}(id=${sp.id})}" class="btn btn-sm btn-outline-danger w-100">
                                <i class="bi bi-cart-plus"></i> Thêm vào giỏ
                            </a>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

    <div th:replace="~{fragments :: footer}"></div>

</body>
</html>
