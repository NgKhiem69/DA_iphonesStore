<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.name} + ' - Exclusive'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .product-image-container {
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 500px;
            border-radius: 4px;
        }
        .product-image-container img {
            max-height: 80%;
            max-width: 80%;
            object-fit: contain;
        }
        .btn-buy-now {
            background-color: #db4444;
            color: white;
            border: none;
        }
        .btn-buy-now:hover {
            background-color: #c93030;
            color: white;
        }
    </style>
</head>
<body>

    <div th:replace="~{fragments :: header}"></div>

    <main class="container my-5">
        <nav aria-label="breadcrumb" class="mb-5">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}" class="text-secondary text-decoration-none">Home</a></li>
                <li class="breadcrumb-item"><a th:href="@{/(categoryId=${product.category.id})}" class="text-secondary text-decoration-none" th:text="${product.category.name}"></a></li>
                <li class="breadcrumb-item active text-dark fw-medium" aria-current="page" th:text="${product.name}"></li>
            </ol>
        </nav>

        <div class="row mb-5 pb-5 border-bottom">
            <div class="col-md-6 mb-4 mb-md-0">
                <div class="product-image-container">
                    <img th:if="${product.imageUrl != null and !product.imageUrl.isEmpty()}" 
                         th:src="${product.imageUrl}" alt="Sản phẩm">
                    <img th:unless="${product.imageUrl != null and !product.imageUrl.isEmpty()}" 
                         src="https://via.placeholder.com/500x500" alt="Chưa có ảnh">
                </div>
            </div>
            
            <div class="col-md-6 ps-md-5">
                <h2 class="fw-bold mb-3" th:text="${product.name}"></h2>
                <h3 class="fw-medium text-danger mb-4" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></h3>
                
                <p class="text-secondary mb-4 lh-lg">
                    Sản phẩm chính hãng, bảo hành 12 tháng. Hỗ trợ đổi trả trong vòng 7 ngày nếu có lỗi từ nhà sản xuất. Miễn phí giao hàng toàn quốc.
                </p>
                
                <hr class="my-4">
                
                <div class="d-flex align-items-center gap-3 mt-4">
                    <a th:href="${session.userId != null ? '/cart/add/' + product.id : '/login'}" class="btn btn-buy-now px-5 py-2 fs-5 flex-grow-1">Mua Ngay</a>
                    <a th:href="${session.userId != null ? '/wishlist/add/' + product.id : '/login'}" class="btn btn-outline-secondary py-2 px-3 fs-5">
                        <i class="bi bi-heart"></i>
                    </a>
                </div>
                
                <div class="mt-5 border rounded p-3">
                    <div class="d-flex align-items-center mb-3">
                        <i class="bi bi-truck fs-3 me-3 text-danger"></i>
                        <div>
                            <h6 class="fw-bold mb-1">Free Delivery</h6>
                            <small class="text-secondary">Nhập mã bưu điện để kiểm tra thời gian giao hàng</small>
                        </div>
                    </div>
                    <hr>
                    <div class="d-flex align-items-center">
                        <i class="bi bi-arrow-return-left fs-3 me-3 text-danger"></i>
                        <div>
                            <h6 class="fw-bold mb-1">Return Delivery</h6>
                            <small class="text-secondary">Miễn phí trả hàng trong vòng 30 ngày.</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex align-items-center mb-4">
            <div style="width: 20px; height: 40px; background-color: #db4444; border-radius: 4px;" class="me-3"></div>
            <h5 class="text-danger fw-bold m-0">Related Item</h5>
        </div>

        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-4 g-4">
            <div class="col" th:each="sp : ${relatedProducts}">
                <div class="card h-100 shadow-sm position-relative">
                    
                    <a th:href="${session.userId != null ? '/wishlist/add/' + sp.id : '/login'}" class="wishlist-btn position-absolute top-0 end-0 p-2 text-danger" style="z-index: 10;">
                        <i class="bi bi-heart"></i>
                    </a>

                    <img th:if="${sp.imageUrl != null and !sp.imageUrl.isEmpty()}" 
                         th:src="${sp.imageUrl}" class="card-img-top" alt="Sản phẩm" style="height: 200px; object-fit: contain; padding: 10px;" />
                    <img th:unless="${sp.imageUrl != null and !sp.imageUrl.isEmpty()}" 
                         src="https://via.placeholder.com/300x300" class="card-img-top" alt="Chưa có ảnh" style="height: 200px; object-fit: contain; padding: 10px;" />

                    <div class="card-body">
                        <h6 class="card-title">
                            <a th:href="@{/product/{id}(id=${sp.id})}" class="text-decoration-none text-dark" th:text="${sp.name}"></a>
                        </h6>
                        <div class="fw-bold text-danger fs-5" th:text="${#numbers.formatDecimal(sp.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></div>
                    </div>

                    <div class="card-footer bg-white border-0">
                        <a th:href="${session.userId != null ? '/cart/add/' + sp.id : '/login'}" class="btn btn-sm btn-outline-danger w-100">
                            <i class="bi bi-cart-plus"></i> Thêm vào giỏ
                        </a>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <div th:replace="~{fragments :: footer}"></div>

</body>
</html>
