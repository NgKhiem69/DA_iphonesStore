<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm Sản Phẩm Mới</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Thêm sản phẩm điện tử mới</h2>
    <form th:action="@{/admin/product/add}" th:object="${product}" method="post">
        <div class="form-group">
            <label>Tên sản phẩm:</label>
            <input type="text" th:field="*{name}" required />
        </div>
        <div class="form-group">
            <label>Thương hiệu:</label>
            <input type="text" th:field="*{brand}" />
        </div>
        <div class="form-group">
            <label>Giá (VNĐ):</label>
            <input type="number" th:field="*{price}" required />
        </div>
        <div class="form-group">
            <label>Danh mục:</label>
            <select th:field="*{category.id}">
                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
            </select>
        </div>
        <div class="form-group">
            <label>Mô tả:</label>
            <textarea th:field="*{description}"></textarea>
        </div>
        <div class="form-group">
            <label>URL Hình ảnh:</label>
            <input type="text" th:field="*{imageUrl}" />
        </div>
        <button type="submit">Lưu sản phẩm</button>
    </form>
    <br>
    <a th:href="@{/admin/dashboard}">Quay lại trang quản trị</a>
</body>
</html>
