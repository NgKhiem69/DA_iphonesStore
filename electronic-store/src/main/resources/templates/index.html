<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trang Chủ - Exclusive</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div th:replace="~{fragments :: header}"></div>

    <main>
        <div class="section-title">Our Products</div>
        <h2 class="section-heading">Khám Phá Sản Phẩm</h2>
        
        <div class="product-grid">
            <div class="product-card" th:each="product : ${products}">
                <img th:src="${product.imageUrl}" class="product-image" alt="Hình sản phẩm">
                
                <a th:href="@{/cart/add/{id}(id=${product.id})}" class="add-to-cart-btn">Add To Cart</a>
                
                <div class="product-info">
                    <a href="#" class="product-name" th:text="${product.name}">Tên sản phẩm</a>
                    <span class="product-price" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">Giá tiền</span>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments :: footer}"></div>

</body>
</html>
