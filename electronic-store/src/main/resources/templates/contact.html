<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liên Hệ - Exclusive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .contact-icon { width: 40px; height: 40px; background-color: #db4444; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .form-control { background-color: #f5f5f5; border: none; padding: 15px; border-radius: 4px; }
        .form-control:focus { background-color: #f5f5f5; box-shadow: none; border: 1px solid #db4444; }
        .btn-exclusive { background-color: #db4444; color: white; padding: 12px 30px; border: none; border-radius: 4px; font-weight: 500; transition: 0.3s; }
        .btn-exclusive:hover { background-color: #c93030; color: white; }
    </style>
</head>
<body class="bg-white">

    <div th:replace="~{fragments :: header}"></div>

    <main class="container my-5">
        <nav aria-label="breadcrumb" class="mb-5">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}" class="text-secondary text-decoration-none">Home</a></li>
                <li class="breadcrumb-item active text-dark fw-medium" aria-current="page">Contact</li>
            </ol>
        </nav>

        <div class="row g-5">
            <div class="col-lg-4">
                <div class="p-4 shadow-sm rounded h-100 border">
                    <div class="d-flex align-items-center mb-4">
                        <div class="contact-icon me-3"><i class="bi bi-telephone"></i></div>
                        <h5 class="fw-bold m-0">Call To Us</h5>
                    </div>
                    <p class="mb-3 text-secondary">We are available 24/7, 7 days a week.</p>
                    <p class="mb-4 fw-medium">Phone: +8801611112222</p>
                    
                    <hr class="my-4">
                    
                    <div class="d-flex align-items-center mb-4">
                        <div class="contact-icon me-3"><i class="bi bi-envelope"></i></div>
                        <h5 class="fw-bold m-0">Write To Us</h5>
                    </div>
                    <p class="mb-3 text-secondary">Fill out our form and we will contact you within 24 hours.</p>
                    <p class="mb-2 fw-medium">Emails: customer@exclusive.com</p>
                    <p class="mb-0 fw-medium">Emails: support@exclusive.com</p>
                </div>
            </div>
            
            <div class="col-lg-8">
                <div class="p-4 p-md-5 shadow-sm rounded h-100 border">
                    <form action="#" method="post">
                        <div class="row g-3 mb-4">
                            <div class="col-md-4">
                                <input type="text" class="form-control" placeholder="Your Name *" required>
                            </div>
                            <div class="col-md-4">
                                <input type="email" class="form-control" placeholder="Your Email *" required>
                            </div>
                            <div class="col-md-4">
                                <input type="text" class="form-control" placeholder="Your Phone *" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <textarea class="form-control" rows="8" placeholder="Your Message" required></textarea>
                        </div>
                        <div class="d-flex justify-content-end">
                            <button type="submit" class="btn btn-exclusive fs-5">Send Message</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments :: footer}"></div>

</body>
</html>
