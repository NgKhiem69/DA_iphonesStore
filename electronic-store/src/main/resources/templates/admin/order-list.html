<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Đơn hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="d-flex">
        <div th:replace="~{admin/fragments :: sidebar}"></div>
        
        <div style="margin-left: 250px; width: 100%;">
            <div class="bg-white shadow-sm p-3 mb-4 d-flex justify-content-between align-items-center">
                <h5 class="m-0">Quản lý Đơn hàng</h5>
                <span>Xin chào, Admin</span>
            </div>
            
            <div class="container-fluid p-4">
                <h3 class="mb-4">Danh sách đơn hàng</h3>

                <div class="card shadow-sm border-0">
                    <div class="card-body p-0">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-dark">
                                <tr>
                                    <th>Mã ĐH</th>
                                    <th>Khách hàng</th>
                                    <th>SĐT</th>
                                    <th>Tổng tiền</th>
                                    <th>Trạng thái</th>
                                    <th class="text-center">Hành động</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="dh : ${orders}">
                                    <td th:text="'#' + ${dh.id}"></td>
                                    <td th:text="${dh.user != null ? dh.user.email : 'Khách vãng lai'}"></td>
                                    <td th:text="${dh.phone}"></td>
                                    <td th:text="${#numbers.formatDecimal(dh.totalPrice, 0, 'COMMA', 0, 'POINT')} + ' ₫'" class="text-danger fw-bold"></td>
                                    <td>
                                        <span th:text="${dh.status}" 
                                              th:class="${dh.status == 'Đang chờ duyệt'} ? 'badge bg-warning text-dark' : (${dh.status == 'Đang giao hàng'} ? 'badge bg-primary' : 'badge bg-success')">
                                        </span>
                                    </td>
                                    <td class="text-center">
                                        <form th:action="@{/admin/orders/update-status}" method="post" class="d-flex gap-2 justify-content-center">
                                            <input type="hidden" name="orderId" th:value="${dh.id}" />
                                            <select name="status" class="form-select form-select-sm" style="width: 160px;">
                                                <option value="Đang chờ duyệt" th:selected="${dh.status == 'Đang chờ duyệt'}">Đang chờ duyệt</option>
                                                <option value="Đang giao hàng" th:selected="${dh.status == 'Đang giao hàng'}">Đang giao hàng</option>
                                                <option value="Đã hoàn thành" th:selected="${dh.status == 'Đã hoàn thành'}">Đã hoàn thành</option>
                                            </select>
                                            <button type="submit" class="btn btn-sm btn-dark">Cập nhật</button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
