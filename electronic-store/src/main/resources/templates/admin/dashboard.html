<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="d-flex">
        <div th:replace="~{admin/fragments :: sidebar}"></div>
        
        <div style="margin-left: 250px; width: 100%;">
            <div class="bg-white shadow-sm p-3 mb-4 d-flex justify-content-between">
                <h5 class="m-0">Tổng quan hệ thống</h5>
                <span>Xin chào, Admin</span>
            </div>
            
            <div class="container-fluid">
                <h2 class="mb-4">Bảng điều khiển</h2>
                <div class="row">
                    <div class="col-md-6">
                        <div class="card bg-primary text-white shadow">
                            <div class="card-body">
                                <h4>Module Sản phẩm</h4>
                                <h2>Cập nhật kho hàng</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card bg-success text-white shadow">
                            <div class="card-body">
                                <h4>Module Đơn hàng</h4>
                                <h2>Xử lý trạng thái</h2>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
