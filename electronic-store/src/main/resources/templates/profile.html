<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Account - Exclusive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div th:replace="~{fragments :: header}"></div>

    <main class="container my-5">
        
        <div class="d-flex justify-content-between align-items-center mb-5 mt-4">
            <div>
                <span class="text-muted">Home / </span><span class="fw-bold">My Account</span>
            </div>
            <div>
                <span>Welcome! <span class="text-danger" th:text="${user.firstName + ' ' + user.lastName}"></span></span>
            </div>
        </div>

        <div class="row">
            <div class="col-md-3 account-sidebar">
                <div class="menu-title">Manage My Account</div>
                <ul>
                    <li><a href="#" class="active">My Profile</a></li>
                </ul>
                <div class="menu-title"><a href="/wishlist" class="text-dark fw-bold text-decoration-none">My WishList</a></div>
            </div>

            <div class="col-md-9">
                <div class="profile-form-box">
                    <h4 class="text-danger fw-bold mb-4">Edit Your Profile</h4>
                    
                    <div th:if="${error}" class="alert alert-danger py-2 mb-4" th:text="${error}"></div>
                    <div th:if="${param.success}" class="alert alert-success py-2 mb-4">Cập nhật thông tin thành công!</div>
                    
                    <form th:action="@{/profile/update}" th:object="${user}" method="post">
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label>First Name</label>
                                <input type="text" th:field="*{firstName}" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label>Last Name</label>
                                <input type="text" th:field="*{lastName}" class="form-control" required>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label>Email</label>
                                <input type="email" th:field="*{email}" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label>Address</label>
                                <input type="text" th:field="*{address}" class="form-control">
                            </div>
                        </div>

                        <h6 class="mt-5 mb-3 fw-bold">Password Changes</h6>
                        <div class="mb-3">
                            <input type="password" name="currentPassword" class="form-control" placeholder="Current Password">
                        </div>
                        <div class="mb-3">
                            <input type="password" name="newPassword" class="form-control" placeholder="New Password">
                        </div>
                        <div class="mb-4">
                            <input type="password" name="confirmPassword" class="form-control" placeholder="Confirm New Password">
                        </div>

                        <div class="d-flex justify-content-end align-items-center mt-4">
                            <a th:href="@{/profile}" class="text-dark text-decoration-none me-4 fw-medium">Cancel</a>
                            <button type="submit" class="btn btn-danger px-4 py-2">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </main>

    <div th:replace="~{fragments :: footer}"></div>

</body>
</html>
