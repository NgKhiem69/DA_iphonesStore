<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quên mật khẩu - Exclusive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .login-image-container { background-color: #dbedf2; display: flex; align-items: center; justify-content: center; height: 100%; min-height: 550px; padding: 20px; }
        .login-image-container img { max-width: 100%; height: auto; object-fit: contain; }
        .form-underline { border: none; border-bottom: 1px solid #b3b3b3; border-radius: 0; padding: 12px 0; box-shadow: none !important; transition: 0.3s; }
        .form-underline:focus { border-bottom-color: #db4444; }
        .btn-exclusive { background-color: #db4444; color: white; border: none; padding: 16px 0; border-radius: 4px; font-weight: 500; transition: 0.3s; }
        .btn-exclusive:hover { background-color: #c93030; color: white; }
    </style>
</head>
<body class="bg-white">
    <div th:replace="~{fragments :: header}"></div>

    <main class="container-fluid px-0 my-5">
        <div class="row g-0 align-items-center">
            <div class="col-md-6 col-lg-7">
                <div class="login-image-container">
                    <img th:src="@{/images/login-side.png}" src="https://via.placeholder.com/600x600" alt="Shopping Cart">
                </div>
            </div>
            <div class="col-md-6 col-lg-5">
                <div class="p-5 p-lg-5 m-lg-4">
                    <h2 class="fw-bold mb-3 fs-1">Quên mật khẩu</h2>
                    <p class="text-dark mb-5 fs-5">Nhập email của bạn, chúng tôi sẽ gửi mã xác thực (OTP).</p>
                    
                    <div th:if="${error}" class="alert alert-danger py-2 mb-4" th:text="${error}"></div>
                    
                    <form th:action="@{/forgot-password}" method="post">
                        <div class="mb-5">
                            <input type="email" name="email" class="form-control form-underline fs-5" placeholder="Email đã đăng ký" required>
                        </div>
                        <button type="submit" class="btn btn-exclusive w-100 fs-5 mb-3">Gửi mã OTP</button>
                    </form>
                    
                    <div class="text-center mt-4 fs-5">
                        <a th:href="@{/login}" class="text-dark fw-medium text-decoration-none"><i class="bi bi-arrow-left"></i> Quay lại Đăng nhập</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments :: footer}"></div>
</body>
</html>
