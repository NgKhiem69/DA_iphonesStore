<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập - Exclusive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .login-image-container {
            background-color: #dbedf2;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 550px;
            padding: 20px;
        }
        .login-image-container img {
            max-width: 100%;
            height: auto;
            object-fit: contain;
        }
        .login-form-container {
            padding: 80px;
        }
        .form-underline {
            border: none;
            border-bottom: 1px solid #b3b3b3;
            border-radius: 0;
            padding: 12px 0;
            box-shadow: none !important;
            transition: border-color 0.3s;
        }
        .form-underline:focus {
            border-bottom-color: #db4444;
        }
        .btn-exclusive {
            background-color: #db4444;
            color: white;
            border: none;
            padding: 16px 48px;
            border-radius: 4px;
            font-weight: 500;
            transition: background-color 0.3s;
        }
        .btn-exclusive:hover {
            background-color: #c93030;
            color: white;
        }
        .link-exclusive {
            color: #db4444;
            text-decoration: none;
        }
        .link-exclusive:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body class="bg-white">

    <div th:replace="~{fragments :: header}"></div>

    <main class="container-fluid px-0 my-5">
        <div class="row g-0 align-items-center">
            
            <div class="col-md-6 col-lg-7">
    <div class="login-image-container">
        <img src="https://static.vecteezy.com/system/resources/previews/035/884/631/large_2x/isometric-smart-phone-online-shopping-concept-online-store-shopping-cart-icon-ecommerce-illustration-in-flat-style-vector.jpg" alt="Shopping Cart">
    </div>
</div>

            <div class="col-md-6 col-lg-5">
                <div class="login-form-container">
                    <h2 class="fw-bold mb-3 fs-1">Đăng nhập vào Exclusive</h2>
                    <p class="text-dark mb-5 fs-5">Nhập thông tin của bạn bên dưới</p>
                    
                    <div th:if="${error}" class="alert alert-danger py-2 mb-4" th:text="${error}"></div>
                    
                    <form th:action="@{/login}" method="post">
                        <div class="mb-4">
                            <input type="text" name="email" class="form-control form-underline fs-5" placeholder="Email hoặc Số điện thoại" required>
                        </div>
                        <div class="mb-5">
                            <input type="password" name="password" class="form-control form-underline fs-5" placeholder="Mật khẩu" required>
                        </div>
                        <div th:if="${param.resetSuccess}" class="alert alert-success py-2 mb-4">Đổi mật khẩu thành công! Vui lòng đăng nhập lại.</div>

						<div class="d-flex justify-content-between align-items-center mb-5">
    						<button type="submit" class="btn btn-exclusive px-5 fs-5">Đăng nhập</button>
    						<a th:href="@{/forgot-password}" class="text-danger text-decoration-none fw-medium fs-5">Quên mật khẩu?</a>
						</div>
                        
                    </form>
                    
                    	<div class="mt-5 fs-5">
    						<span class="text-muted">Chưa có tài khoản?</span>
    						<a th:href="@{/signup}" class="link-exclusive fw-medium ms-2">Đăng ký ngay</a>
						</div>
                </div>
            </div>

        </div>
    </main>

    <div th:replace="~{fragments :: footer}"></div>

</body>
</html>
