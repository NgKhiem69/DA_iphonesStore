<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="d-flex">
        <div th:replace="~{admin/fragments :: sidebar}"></div>
        
        <div style="margin-left: 250px; width: 100%;">
            <div class="bg-white shadow-sm p-3 mb-4 d-flex justify-content-between align-items-center">
                <h5 class="m-0">Quản lý Sản phẩm</h5>
                <span>Xin chào, Admin</span>
            </div>
            
            <div class="container-fluid p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="m-0">Danh sách sản phẩm</h3>
                    <a th:href="@{/admin/products/add}" class="btn btn-primary">
                        <i class="bi bi-plus-lg"></i> Thêm sản phẩm mới
                    </a>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-body p-0">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-dark">
                                <tr>
                                    <th style="width: 80px;">ID</th>
                                    <th style="width: 100px;">Hình ảnh</th>
                                    <th>Tên sản phẩm</th>
                                    <th>Giá tiền</th>
                                    <th style="width: 200px;" class="text-center">Hành động</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="sp : ${products}">
                                    <td th:text="${sp.id}"></td>
                                    <td>
                                        <img th:if="${sp.imageUrl != null and !sp.imageUrl.isEmpty()}" 
                                             th:src="${sp.imageUrl}" 
                                             style="width: 50px; height: 50px; object-fit: contain;" />
                                        <img th:unless="${sp.imageUrl != null and !sp.imageUrl.isEmpty()}" 
                                             src="https://via.placeholder.com/50" 
                                             style="width: 50px; height: 50px; object-fit: contain;" />
                                    </td>
                                    <td th:text="${sp.name}" class="fw-medium"></td>
                                    <td th:text="${#numbers.formatDecimal(sp.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'" class="text-danger fw-bold"></td>
                                    <td class="text-center">
                                        <a th:href="@{/admin/products/edit/{id}(id=${sp.id})}" class="btn btn-sm btn-warning me-2">
                                            <i class="bi bi-pencil-square"></i> Sửa
                                        </a>
                                        <a th:href="@{/admin/products/delete/{id}(id=${sp.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Bạn có chắc chắn muốn xóa sản phẩm này?')">
                                            <i class="bi bi-trash"></i> Xóa
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
