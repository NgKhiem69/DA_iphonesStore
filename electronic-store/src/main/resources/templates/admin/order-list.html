<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Đơn hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="d-flex">
        <div th:replace="~{admin/fragments :: sidebar}"></div>
        
        <div style="margin-left: 250px; width: 100%;">
            <div class="bg-white shadow-sm p-3 mb-4 d-flex justify-content-between align-items-center">
                <h5 class="m-0">Quản lý Đơn hàng</h5>
                <span>Xin chào, Admin</span>
            </div>
            
            <div class="container-fluid p-4">
                <h3 class="mb-4">Danh sách đơn hàng</h3>

                <div class="card shadow-sm border-0">
                    <div class="card-body p-0">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-dark">
                                <tr>
                                    <th>Mã ĐH</th>
                                    <th>Khách hàng</th>
                                    <th>SĐT</th>
                                    <th>Tổng tiền</th>
                                    <th>Trạng thái</th>
                                    <th class="text-center">Hành động</th>
                                </tr>
                            </thead>
                            <tbody>
    <tr th:each="order : ${orders}">
        <td th:text="'#' + ${order.id}"></td>
        <td th:text="${order.user != null ? order.user.email : 'Ẩn danh'}"></td>
        <td th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></td>
        <td th:text="${order.totalPrice != null ? #numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT') : 0} + ' ₫'"></td>
        <td>
            <span class="badge" 
                  th:classappend="${order.status == 'Đã giao' ? 'bg-success' : (order.status == 'Đã hủy' ? 'bg-secondary' : 'bg-primary')}"
                  th:text="${order.status}"></span>
        </td>
        <td>
            <a th:href="@{/admin/orders/detail/{id}(id=${order.id})}" class="btn btn-sm btn-info text-white">Xem chi tiết</a>
        </td>
    </tr>
</tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
