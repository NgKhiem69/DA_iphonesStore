<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi Tiết Đơn Hàng - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold m-0" th:text="'Chi tiết đơn hàng #' + ${order.id}"></h2>
            <a th:href="@{/admin/orders}" class="btn btn-outline-secondary">Quay lại danh sách</a>
        </div>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-body">
                        <h5 class="fw-bold mb-3">Thông tin khách hàng</h5>
                        <p class="mb-2"><strong>Email tài khoản:</strong> <span th:text="${order.user != null ? order.user.email : 'Ẩn danh'}"></span></p>
                        <p class="mb-2"><strong>Trạng thái đơn hàng:</strong></p>
                        <form th:action="@{/admin/orders/update-status}" method="post" class="d-flex gap-2">
                            <input type="hidden" name="orderId" th:value="${order.id}">
                            <select name="status" class="form-select form-select-sm">
                                <option value="Chờ xử lý" th:selected="${order.status == 'Chờ xử lý'}">Chờ xử lý</option>
                                <option value="Đang xử lý" th:selected="${order.status == 'Đang xử lý'}">Đang xử lý</option>
                                <option value="Đang giao" th:selected="${order.status == 'Đang giao'}">Đang giao</option>
                                <option value="Đã giao" th:selected="${order.status == 'Đã giao'}">Đã giao</option>
                                <option value="Đã hủy" th:selected="${order.status == 'Đã hủy'}">Đã hủy</option>
                            </select>
                            <button type="submit" class="btn btn-sm btn-primary">Cập nhật</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="fw-bold mb-3">Danh sách sản phẩm đã mua</h5>
                        <div class="table-responsive">
                            <table class="table align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>Sản phẩm</th>
                                        <th>Giá</th>
                                        <th>Số lượng</th>
                                        <th>Tổng cộng</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="detail : ${order.orderDetails}">
                                        <td>
                                            <div class="d-flex align-items-center gap-3">
                                                <img th:src="${detail.product.imageUrl}" alt="Product" style="width: 50px; height: 50px; object-fit: contain;">
                                                <span class="fw-medium" th:text="${detail.product.name}"></span>
                                            </div>
                                        </td>
                                        <td th:text="${#numbers.formatDecimal(detail.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>
                                        <td th:text="${detail.quantity}"></td>
                                        <td class="fw-bold text-danger" th:text="${#numbers.formatDecimal(detail.price * detail.quantity, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
