<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập - Exclusive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

    <div th:replace="~{fragments :: header}"></div>

    <main class="container my-5">
        <div class="row align-items-center justify-content-center" style="min-height: 60vh;">
            <div class="col-md-5">
                <div class="p-5 shadow-sm border rounded bg-white">
                    <h3 class="fw-bold mb-2">Log in to Exclusive</h3>
                    <p class="text-muted mb-4">Enter your details below</p>
                    
                    <div th:if="${error}" class="alert alert-danger text-center py-2" th:text="${error}"></div>
                    
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <input type="email" name="email" class="form-control py-3 border-0 border-bottom rounded-0 px-0 shadow-none" placeholder="Email or Phone Number" required>
                        </div>
                        <div class="mb-4">
                            <input type="password" name="password" class="form-control py-3 border-0 border-bottom rounded-0 px-0 shadow-none" placeholder="Password" required>
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center">
                            <button type="submit" class="btn btn-danger px-5 py-3 fw-medium" style="background-color: #db4444; border: none;">Log In</button>
                            <a href="#" class="text-danger text-decoration-none">Forget Password?</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments :: footer}"></div>

</body>
</html>
