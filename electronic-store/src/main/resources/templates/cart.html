<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giỏ Hàng - Exclusive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link class="custom-css" rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .btn-red {
            background-color: #db4444;
            color: white;
            border: none;
            transition: 0.3s;
        }
        .btn-red:hover {
            background-color: #c93030;
            color: white;
        }
        .cart-row {
            box-shadow: 0 1px 15px rgba(0,0,0,0.05);
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 30px;
            background: #fff;
        }
        .cart-total-box {
            border: 2px solid #222;
            border-radius: 4px;
            padding: 30px;
        }
        .remove-btn {
            position: absolute;
            top: -8px;
            left: -8px;
            color: #db4444;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            text-decoration: none;
            font-size: 18px;
            line-height: 1;
        }
        .remove-btn:hover {
            color: #c93030;
        }
    </style>
</head>
<body>

    <div th:replace="~{fragments :: header}"></div>

    <main class="container my-5">
        <div class="mb-5 mt-4">
            <span class="text-muted">Home / </span><span class="fw-bold">Cart</span>
        </div>

        <div class="row align-items-center text-center fw-bold cart-row">
            <div class="col-3 text-start">Product</div>
            <div class="col-3">Price</div>
            <div class="col-3">Quantity</div>
            <div class="col-3 text-end">Subtotal</div>
        </div>

        <form th:action="@{/cart/update}" method="post" th:with="totalCartPrice=${cartItems.size() > 0 ? #aggregates.sum(cartItems.![product.price * quantity]) : 0}">
            
            <div class="row align-items-center text-center cart-row" th:each="item : ${cartItems}">
                <input type="hidden" name="itemIds" th:value="${item.id}">
                
                <div class="col-3 text-start d-flex align-items-center">
                    <div class="position-relative me-3">
                        <img th:src="${item.product.imageUrl}" width="60" height="60" class="object-fit-contain p-1 border rounded" alt="Sản phẩm">
                        <a th:href="@{/cart/remove/{id}(id=${item.id})}" class="remove-btn shadow-sm"><i class="bi bi-x-circle-fill"></i></a>
                    </div>
                    <span th:text="${item.product.name}" class="text-truncate fw-medium"></span>
                </div>
                
                <div class="col-3 fw-medium">
                    <span th:text="${#numbers.formatDecimal(item.product.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></span>
                </div>
                
                <div class="col-3">
                    <input type="number" name="quantities" class="form-control text-center mx-auto fw-bold" style="width: 80px;" th:value="${item.quantity}" min="1">
                </div>
                
                <div class="col-3 text-end fw-medium">
                    <span th:text="${#numbers.formatDecimal(item.product.price * item.quantity, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></span>
                </div>
            </div>

            <div class="d-flex justify-content-between mb-5 mt-4">
                <a th:href="@{/}" class="btn btn-outline-dark px-5 py-3 fw-medium">Return To Shop</a>
                <button type="submit" class="btn btn-outline-dark px-5 py-3 fw-medium">Update Cart</button>
            </div>

            <div class="row mt-5">
                <div class="col-lg-6 col-md-12 mb-4">
                    <div class="d-flex gap-3">
                        <input type="text" class="form-control w-50 py-3" placeholder="Coupon Code">
                        <button type="button" class="btn btn-red px-5 py-3 fw-medium">Apply Coupon</button>
                    </div>
                </div>
                
                <div class="col-lg-5 col-md-12 offset-lg-1">
                    <div class="cart-total-box">
                        <h4 class="mb-4 fw-bold">Cart Total</h4>
                        
                        <div class="d-flex justify-content-between border-bottom pb-3 mb-3">
                            <span class="fw-medium">Subtotal:</span>
                            <span th:text="${#numbers.formatDecimal(totalCartPrice, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></span>
                        </div>
                        
                        <div class="d-flex justify-content-between border-bottom pb-3 mb-3">
                            <span class="fw-medium">Shipping:</span>
                            <span>Free</span>
                        </div>
                        
                        <div class="d-flex justify-content-between mb-4">
                            <span class="fw-bold">Total:</span>
                            <span class="fw-bold" th:text="${#numbers.formatDecimal(totalCartPrice, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></span>
                        </div>
                        
                        <a th:href="@{/cart/checkout}" class="btn btn-red w-100 py-3 fw-medium text-center text-decoration-none d-block">Process to checkout</a>
                    </div>
                </div>
            </div>
        </form>

    </main>

    <div th:replace="~{fragments :: footer}"></div>

</body>
</html>
