<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông tin Sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="d-flex">
        <div th:replace="~{admin/fragments :: sidebar}"></div>
        
        <div style="margin-left: 250px; width: 100%;">
            <div class="bg-white shadow-sm p-3 mb-4 d-flex justify-content-between align-items-center">
                <h5 class="m-0">Quản lý Sản phẩm</h5>
                <span>Xin chào, Admin</span>
            </div>
            
            <div class="container-fluid p-4">
                <div class="card shadow-sm border-0 mx-auto" style="max-width: 700px;">
                    <div class="card-header bg-dark text-white p-3">
                        <h5 class="card-title m-0" th:text="${product.id != null} ? 'Cập nhật sản phẩm' : 'Thêm sản phẩm mới'"></h5>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/admin/products/save}" th:object="${product}" method="post">
                            <input type="hidden" th:field="*{id}" />
                            
                            <div class="mb-3">
                                <label class="form-label fw-medium">Tên sản phẩm</label>
                                <input type="text" th:field="*{name}" class="form-control" required />
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-medium">Giá sản phẩm (₫)</label>
                                <input type="number" th:field="*{price}" class="form-control" required min="0" />
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label fw-medium">Đường dẫn hình ảnh (URL)</label>
                                <input type="text" th:field="*{imageUrl}" class="form-control" placeholder="https://example.com/image.png" />
                            </div>
                            
                            <div class="d-flex justify-content-end gap-2">
                                <a th:href="@{/admin/products}" class="btn btn-secondary px-4">Hủy</a>
                                <button type="submit" class="btn btn-primary px-4">Lưu lại</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
