<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi Tiết Đơn Hàng - Exclusive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .text-exclusive { color: #db4444; }
        .bg-exclusive { background-color: #db4444; color: white; }
        .bg-exclusive:hover { background-color: #c93030; color: white; }
    </style>
</head>
<body>

    <div th:replace="~{fragments :: header}"></div>

    <main class="container my-5">
        <nav aria-label="breadcrumb" class="mb-5">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}" class="text-secondary text-decoration-none">Home</a></li>
                <li class="breadcrumb-item"><a th:href="@{/profile}" class="text-secondary text-decoration-none">My Account</a></li>
                <li class="breadcrumb-item active text-dark fw-medium" aria-current="page" th:text="'Đơn hàng #' + ${order.id}"></li>
            </ol>
        </nav>

        <div class="card border shadow-sm mb-4">
            <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                <div>
                    <span class="text-secondary">Mã đơn hàng:</span>
                    <strong th:text="'#' + ${order.id}"></strong>
                </div>
                <div>
                    <span class="badge fs-6 px-3 py-2" 
                          th:classappend="${order.status == 'Đã giao' ? 'bg-success' : (order.status == 'Đã hủy' ? 'bg-secondary' : 'bg-primary')}"
                          th:text="${order.status}"></span>
                </div>
            </div>
            <div class="card-body p-4">
                <div class="table-responsive">
                    <table class="table align-middle border-bottom">
                        <thead>
                            <tr class="text-secondary">
                                <th>SẢN PHẨM</th>
                                <th>GIÁ</th>
                                <th class="text-center">SỐ LƯỢNG</th>
                                <th class="text-end">TỔNG CỘNG</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="detail : ${order.orderDetails}">
                                <td>
                                    <div class="d-flex align-items-center gap-3 py-2">
                                        <img th:src="${detail.product.imageUrl}" alt="Product" style="width: 60px; height: 60px; object-fit: contain;">
                                        <span class="fw-medium text-dark" th:text="${detail.product.name}"></span>
                                    </div>
                                </td>
                                <td th:text="${#numbers.formatDecimal(detail.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>
                                <td class="text-center" th:text="${detail.quantity}"></td>
                                <td class="text-end fw-bold text-exclusive" th:text="${#numbers.formatDecimal(detail.price * detail.quantity, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div class="d-flex justify-content-between align-items-center mt-4">
                    <a th:href="@{/profile}" class="btn btn-outline-dark px-4 py-2">Quay lại Tài khoản</a>
                    <div class="text-end">
                        <span class="fs-5 text-secondary me-2">Thành tiền:</span>
                       <span class="fs-3 fw-bold text-exclusive" th:text="${order.totalPrice != null ? #numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT') : 0} + ' ₫'"></span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments :: footer}"></div>

</body>
</html>
