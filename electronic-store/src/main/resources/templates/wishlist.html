<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Wishlist - Exclusive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div th:replace="~{fragments :: header}"></div>

    <main class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h5 class="fw-bold m-0">Wishlist (<span th:text="${wishlistItems.size()}"></span>)</h5>
            <button class="btn btn-outline-dark px-4 py-2 fw-medium">Move All To Bag</button>
        </div>

        <div class="product-grid">
            <div class="product-card" th:each="item : ${wishlistItems}">
                <div class="product-image-box">
                    <a th:href="@{/wishlist/remove/{id}(id=${item.id})}" class="position-absolute top-0 end-0 m-2 text-dark bg-white rounded-circle p-1 shadow-sm d-flex" style="text-decoration: none; z-index: 10;">
                        <i class="bi bi-trash3"></i>
                    </a>

                    <img th:src="${item.product.imageUrl}" class="product-image" alt="Product">
                    
                    <a th:href="@{/cart/add/{id}(id=${item.product.id})}" class="add-to-cart-btn">
                        <i class="bi bi-cart3 me-2"></i> Add To Cart
                    </a>
                </div>
                
                <div class="product-details">
                    <p class="product-name" th:text="${item.product.name}"></p>
                    <p class="product-price">
                        <span class="price" th:text="${#numbers.formatDecimal(item.product.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></span>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments :: footer}"></div>

</body>
</html>
